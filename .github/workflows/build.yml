# This workflow builds the project for selected platforms.

# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Build Runner

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.4.1

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Restore DerivedData Cache
        uses: actions/cache@v5
        with:
          path: .build
          key: deriveddata-arm64-${{ runner.os }}-xcode-26.4.1-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            deriveddata-arm64-${{ runner.os }}-xcode-26.4.1-

      - name: Build Selected Platforms
        run: |
          #!/bin/bash
          set -eo pipefail
          export LLVM_PROFILE_FILE="${RUNNER_TEMP:-/tmp}/Merge-%p.profraw"

          TARGET=""
          PLATFORMS="macOS iOS macCatalyst"
          DERIVED_DATA_PATH=".build"

          xcodebuild -version

          if [ -z "$TARGET" ]; then
            TARGET=$(swift package dump-package | python3 -c "import json,sys; print(json.load(sys.stdin)['name'])")
            if [ -z "$TARGET" ]; then
              echo "Error: Failed to resolve package name"
              exit 1
            fi
          fi

          build_platform() {
            local PLATFORM=$1
            local DESTINATION=$2
            local LOG_FILE="${RUNNER_TEMP:-/tmp}/xcodebuild-${PLATFORM}.log"
            local OBJECTS_PATH_PATTERN="*/Objects-normal/x86_64/*"
            local XCODEBUILD_ARGS=(
              -scheme "$TARGET"
              -derivedDataPath "$DERIVED_DATA_PATH"
              -destination "$DESTINATION"
              -arch arm64
              -skipPackagePluginValidation
              -skipMacroValidation
              ARCHS=arm64
              EXCLUDED_ARCHS=x86_64
            )

            echo "Building $TARGET for $PLATFORM..."
            echo "Architecture policy: arm64 only; x86_64 is excluded."
            find "$DERIVED_DATA_PATH" -path "$OBJECTS_PATH_PATTERN" -prune -exec rm -rf {} +
            if ! NSUnbufferedIO=YES xcodebuild "${XCODEBUILD_ARGS[@]}" 2>&1 | tee "$LOG_FILE" | xcbeautify --renderer github-actions; then
              echo "Failed to build $TARGET for $PLATFORM"
              echo
              echo "Last 200 lines from raw xcodebuild log:"
              tail -n 200 "$LOG_FILE"
              return 1
            fi
            if find "$DERIVED_DATA_PATH" -path "$OBJECTS_PATH_PATTERN" -print -quit | grep -q .; then
              echo "Unexpected x86_64 build outputs were produced under $DERIVED_DATA_PATH"
              return 1
            fi
            echo "Successfully built $TARGET for $PLATFORM"
          }

          echo
          echo "Building $TARGET for [$PLATFORMS]..."

          build_platform "macOS" "generic/platform=macOS"
          build_platform "iOS" "generic/platform=iOS"
          build_platform "macCatalyst" "generic/platform=macOS,variant=Mac Catalyst"

          echo
          echo "Building $TARGET completed successfully!"
